version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: "checksums.txt"

brews:
  - name: portly
    repository:
      owner: mohokh67
      name: homebrew-portly
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: mohokh67
      email: mohokh67@users.noreply.github.com
    homepage: "https://github.com/mohokh67/portly"
    description: "CLI for managing ports — list, inspect, and kill by port number"
    license: "MIT"
    test: |
      system "#{bin}/portly", "--version"
    install: |
      bin.install "portly"

release:
  github:
    owner: mohokh67
    name: portly
